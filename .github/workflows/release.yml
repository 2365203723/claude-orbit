name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Build DMG (${{ matrix.arch }})
        env:
          # If you have Apple Developer credentials, set these as repo secrets:
          # APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npx electron-builder --mac --${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Orbit-mac-${{ matrix.arch }}
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Build EXE
        run: npx electron-builder --win --x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Orbit-win-x64
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: release }

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release -type f \( -name '*.dmg' -o -name '*.exe' \) -exec mv {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
